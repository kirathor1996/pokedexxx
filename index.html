<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Pokédex"/>
<meta name="theme-color" content="#0d0d0d"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Pokédex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --red:#E8192C;--red-dark:#a80f1e;--red-dim:#3a0a10;--red-glow:rgba(232,25,44,0.2);
  --bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:rgba(255,255,255,0.07);--border-red:rgba(232,25,44,0.3);
  --text:#f0f0f0;--text2:#888;--text3:#555;
  --gold:#FFD700;--cyan:#00e5ff;--green:#00ff88;--purple:#bb88ff;
  --font:'Rajdhani',sans-serif;--pixel:'Press Start 2P',monospace;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);height:100%;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh;}
.app-header{
  background:linear-gradient(180deg,#1a0305,#0d0d0d);
  border-bottom:1px solid var(--border-red);
  padding:11px 16px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
.app-body{flex:1;display:flex;overflow:hidden;height:calc(100vh - 53px);}

/* Sidebar — hidden on mobile */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  padding:16px 12px;display:none;flex-direction:column;gap:2px;
  overflow-y:auto;
}
.sidebar-tab{
  display:flex;align-items:center;gap:10px;
  background:transparent;border:1px solid transparent;
  color:var(--text3);font-family:var(--font);font-size:15px;font-weight:700;
  padding:10px 12px;cursor:pointer;border-radius:var(--r);
  text-align:left;width:100%;transition:all 0.15s;
}
.sidebar-tab:hover{background:var(--bg3);color:var(--text2);}
.sidebar-tab.active{background:var(--red-dim);border-color:var(--border-red);color:var(--red);}
.sidebar-tab.st-shiny.active{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.25);color:var(--gold);}
.sidebar-tab.st-reg.active{background:rgba(187,136,255,0.08);border-color:rgba(187,136,255,0.25);color:var(--purple);}
.sidebar-tab.st-notes.active{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.25);color:var(--cyan);}
.sidebar-tab.st-export.active{background:rgba(0,255,136,0.08);border-color:rgba(0,255,136,0.25);color:var(--green);}
.stab-ico{font-size:16px;width:20px;text-align:center;flex-shrink:0;}

/* Main content */
.main{flex:1;overflow-y:auto;padding:14px 16px 80px;}

/* On desktop: no bottom padding needed, no bottom nav */
/* ── BOTTOM NAV (mobile only) ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(13,13,13,0.97);border-top:1px solid var(--border-red);
  display:flex;z-index:90;padding-bottom:env(safe-area-inset-bottom);
  backdrop-filter:blur(20px);
}
.nav-btn{
  flex:1;padding:10px 4px 8px;border:none;background:transparent;
  color:var(--text3);font-family:var(--pixel);font-size:4px;
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  transition:all 0.15s;
}
.nav-ico{font-size:15px;line-height:1;}
.nav-btn.active{color:var(--red);}
.nav-btn.active .nav-ico{filter:drop-shadow(0 0 3px var(--red));}
.nav-btn.nb-shiny.active{color:var(--gold);}
.nav-btn.nb-shiny.active .nav-ico{filter:drop-shadow(0 0 3px var(--gold));}
.nav-btn.nb-reg.active{color:var(--purple);}
.nav-btn.nb-reg.active .nav-ico{filter:drop-shadow(0 0 3px var(--purple));}
.nav-btn.nb-notes.active{color:var(--cyan);}
.nav-btn.nb-notes.active .nav-ico{filter:drop-shadow(0 0 3px var(--cyan));}
.nav-btn.nb-export.active{color:var(--green);}
.nav-btn.nb-export.active .nav-ico{filter:drop-shadow(0 0 3px var(--green));}

/* ── HEADER ── */
.logo-circle{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#88ccff,#0066cc);border:2px solid rgba(255,255,255,0.4);box-shadow:0 0 8px rgba(0,150,255,0.5);flex-shrink:0;}
.logo-dots{display:flex;gap:4px;align-items:center;}
.ld{width:7px;height:7px;border-radius:50%;}
.ld-r{background:#E8192C;box-shadow:0 0 4px #E8192C;}
.ld-y{background:#FFD700;box-shadow:0 0 4px #FFD700;}
.ld-g{background:#00ff88;box-shadow:0 0 4px #00ff88;}
.hdr-title{flex:1;text-align:center;font-family:var(--pixel);font-size:6px;color:var(--text2);letter-spacing:2px;}
.hdr-title span{color:var(--red);}

/* ── SEARCH ── */
.search-bar{display:flex;gap:8px;margin-bottom:10px;}
.search-box{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:15px;font-weight:500;padding:9px 13px;outline:none;border-radius:var(--r);transition:border-color 0.2s;}
.search-box:focus{border-color:var(--red);}
.search-box::placeholder{color:var(--text3);}
.type-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;padding:9px 7px;outline:none;border-radius:var(--r);min-width:85px;}

/* ── GEN / FILTER PILLS ── */
.gen-scroll,.filter-pills{display:flex;gap:5px;overflow-x:auto;margin-bottom:9px;scrollbar-width:none;}
.gen-scroll::-webkit-scrollbar,.filter-pills::-webkit-scrollbar{display:none;}
.gen-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:12px;font-weight:700;padding:5px 11px;cursor:pointer;white-space:nowrap;flex-shrink:0;border-radius:20px;min-height:28px;transition:all 0.15s;}
.gen-btn.active{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.pill{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:11px;font-weight:700;padding:5px 11px;cursor:pointer;white-space:nowrap;flex-shrink:0;border-radius:20px;min-height:26px;display:flex;align-items:center;transition:all 0.15s;text-transform:uppercase;}
.pill.active{background:var(--red-dim);border-color:var(--red);color:#fff;}

/* ── STATS BAR ── */
.stats-bar{background:var(--bg2);border:1px solid var(--border);padding:7px 13px;margin-bottom:10px;display:flex;justify-content:space-between;border-radius:var(--r);flex-wrap:wrap;gap:4px;}
.stats-bar span{color:var(--text2);font-size:12px;font-weight:700;}
.s-red{color:var(--red) !important;}
.s-gold{color:var(--gold) !important;}

/* ── POKEMON GRID ── */
.pokemon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px;}
.poke-card{background:var(--bg2);border:1px solid var(--border);padding:5px 3px;text-align:center;cursor:pointer;position:relative;border-radius:var(--r);transition:all 0.12s;}
.poke-card:active{transform:scale(0.93);}
.poke-card.caught{border-color:var(--red);background:linear-gradient(135deg,#1a0305,#0d0d0d);}
.poke-card.caught::before{content:'';position:absolute;inset:0;border-radius:var(--r);box-shadow:inset 0 0 10px var(--red-glow);pointer-events:none;}
.poke-card.shiny-caught{border-color:var(--gold);background:linear-gradient(135deg,#1a1500,#0d0d0d);}
.poke-card.selected{outline:2px solid var(--gold);}
.poke-card.has-note::after{content:'✎';position:absolute;bottom:2px;right:3px;font-size:7px;color:var(--cyan);}
.caught-mark{position:absolute;top:3px;right:3px;width:6px;height:6px;background:var(--red);border-radius:50%;display:none;box-shadow:0 0 4px var(--red);}
.poke-card.caught .caught-mark{display:block;}
.poke-card.shiny-caught .caught-mark{display:block;background:var(--gold);box-shadow:0 0 4px var(--gold);}
.shiny-badge{position:absolute;top:2px;left:3px;font-size:8px;display:none;color:var(--gold);}
.poke-card.shiny-caught .shiny-badge{display:block;}
.poke-num{color:var(--text3);font-size:9px;font-weight:700;margin-bottom:1px;}
.poke-card.caught .poke-num{color:var(--red);}
.poke-card.shiny-caught .poke-num{color:var(--gold);}
.poke-img{width:100%;max-width:54px;height:auto;aspect-ratio:1;image-rendering:pixelated;filter:brightness(0.25) saturate(0);}
.poke-card.caught .poke-img,.poke-card.shiny-caught .poke-img{filter:none;}
.poke-name{color:var(--text3);font-size:9px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
.poke-card.caught .poke-name{color:var(--text);}
.poke-card.shiny-caught .poke-name{color:var(--gold);}

/* ── PAGINATION ── */
.pagination{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.page-btn{background:var(--bg3);border:1px solid var(--border-red);color:var(--red);font-family:var(--font);font-size:13px;font-weight:700;padding:9px 18px;cursor:pointer;border-radius:var(--r);min-height:38px;transition:all 0.15s;}
.page-btn:active{background:var(--red-dim);}
.page-info{color:var(--text2);font-size:12px;font-weight:600;}

/* ── FAB ROW ── */
.fab-row{display:flex;gap:7px;margin-bottom:12px;}
.fab-btn{flex:1;background:var(--bg2);border:1px solid var(--border-red);color:var(--red);font-family:var(--font);font-size:12px;font-weight:700;padding:11px;cursor:pointer;border-radius:var(--r);text-align:center;min-height:42px;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.15s;}
.fab-btn:active{background:var(--red-dim);}
.fab-reset{border-color:var(--border);color:var(--text2);}
.fab-reset:active{background:var(--bg3);}

/* ── DRAWER (mobile = bottom sheet, desktop = card) ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:40;display:none;backdrop-filter:blur(3px);}
.drawer-overlay.open{display:block;}
.detail-drawer{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--border-red);
  border-radius:18px 18px 0 0;z-index:50;
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height:88vh;overflow-y:auto;
  padding-bottom:env(safe-area-inset-bottom);
}
.detail-drawer.open{transform:translateY(0);}
.drawer-handle{width:38px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto 8px;}
.drawer-inner{padding:0 15px 80px;}
.drawer-name{color:var(--text);font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.drawer-num{color:var(--red);font-size:12px;font-weight:600;margin-top:2px;margin-bottom:10px;letter-spacing:1px;}
.drawer-imgs{display:flex;gap:10px;justify-content:center;margin-bottom:12px;}
.dib{text-align:center;}
.dib-lbl{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.dib-lbl.sl{color:var(--gold);}
.dart{width:82px;height:82px;image-rendering:pixelated;}

/* ── TYPE BADGES ── */
.type-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.type-badge{font-family:var(--font);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;}

/* ── CATCH ROW ── */
.catch-row{display:grid;grid-template-columns:1fr 1fr 44px;gap:5px;margin-bottom:12px;}
.catch-btn{background:var(--bg3);border:1px solid var(--border-red);color:var(--red);font-family:var(--font);font-size:12px;font-weight:700;padding:11px 4px;cursor:pointer;border-radius:var(--r);text-align:center;min-height:42px;transition:all 0.15s;text-transform:uppercase;}
.catch-btn:active{background:var(--red-dim);}
.catch-btn.caught-btn{background:var(--red-dim);}
.shiny-cb{border-color:rgba(255,215,0,0.4);color:var(--gold);}
.shiny-cb:active,.shiny-cb.caught-btn{background:rgba(255,215,0,0.1);}
.note-cb{border-color:rgba(0,229,255,0.3);color:var(--cyan);font-size:16px;}
.note-cb:active{background:rgba(0,229,255,0.1);}

/* ── DRAWER TABS ── */
.dtabs{display:flex;gap:2px;margin-bottom:12px;background:var(--bg3);border-radius:var(--r);padding:3px;}
.dtab{flex:1;background:transparent;border:none;color:var(--text3);font-family:var(--font);font-size:12px;font-weight:700;padding:7px 4px;cursor:pointer;text-align:center;border-radius:6px;min-height:30px;transition:all 0.15s;text-transform:uppercase;}
.dtab.active{background:var(--red);color:#fff;}
.dsec{display:none;}
.dsec.vis{display:block;}

/* ── STATS ── */
.stat-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.stat-lbl{color:var(--text3);font-size:11px;font-weight:700;width:28px;flex-shrink:0;}
.stat-bg{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.stat-fill{height:100%;border-radius:4px;transition:width 0.4s;}
.stat-val{color:var(--text);font-size:11px;font-weight:700;width:26px;text-align:right;flex-shrink:0;}
.stat-total{color:var(--text2);font-size:11px;text-align:right;margin-top:7px;padding-top:6px;border-top:1px solid var(--border);}

/* ── ABILITIES ── */
.ab-list{display:flex;flex-direction:column;gap:8px;}
.ab-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;}
.ab-card.hidden{border-color:rgba(187,136,255,0.3);background:rgba(187,136,255,0.04);}
.ab-header{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.ab-name{color:var(--text);font-size:13px;font-weight:700;flex:1;text-transform:uppercase;}
.ab-card.hidden .ab-name{color:var(--purple);}
.ab-tag{background:rgba(187,136,255,0.12);color:var(--purple);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid rgba(187,136,255,0.25);}
.ab-desc{color:var(--text2);font-size:13px;line-height:1.5;}
.ab-loading{color:var(--text3);font-size:12px;text-align:center;padding:18px;}

/* ── INFO ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.info-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px;}
.info-lbl{color:var(--text3);font-size:10px;font-weight:700;margin-bottom:3px;letter-spacing:1px;text-transform:uppercase;}
.info-val{color:var(--text);font-size:18px;font-weight:700;}
.evo-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px;}
.evo-lbl{color:var(--text3);font-size:10px;font-weight:700;margin-bottom:9px;letter-spacing:1px;text-transform:uppercase;}
.evo-chain{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.evo-item{text-align:center;cursor:pointer;padding:5px;border-radius:var(--r);transition:background 0.15s;}
.evo-item:active{background:var(--bg4);}
.evo-img{width:50px;height:50px;image-rendering:pixelated;}
.evo-name{color:var(--text2);font-size:10px;font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:54px;text-transform:uppercase;}
.evo-arrow{color:var(--red);font-size:16px;font-weight:700;}

/* ── POKEDEX DESC ── */
.poke-desc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:12px;}
.poke-genus{color:var(--red);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.poke-desc-text{color:var(--text2);font-size:14px;line-height:1.6;font-style:italic;}

/* ── NOTE PREVIEW ── */
.note-preview{color:var(--cyan);font-size:14px;margin-top:9px;padding:9px 11px;background:rgba(0,229,255,0.04);border-left:2px solid var(--cyan);border-radius:0 var(--r) var(--r) 0;word-break:break-word;line-height:1.5;}

/* ── FORMS ── */
.forms-title{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:9px;}
.forms-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.form-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 7px;text-align:center;}
.form-card.reg{border-color:rgba(187,136,255,0.25);}
.form-card-lbl{color:var(--text3);font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px;}
.form-card-lbl.rl{color:var(--purple);}
.form-imgs-row{display:flex;gap:5px;justify-content:center;}
.form-img-box{text-align:center;}
.form-sublbl{font-size:9px;color:var(--text3);margin-bottom:2px;}
.form-sublbl.sl{color:var(--gold);}
.form-art{width:66px;height:66px;image-rendering:pixelated;}
.form-types{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-top:5px;}
.form-tbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:var(--font);}
.form-rtag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:5px;}
.no-forms{color:var(--text3);font-size:12px;text-align:center;padding:16px;}

/* ── NOTE MODAL ── */
.note-modal{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);}
.note-modal.open{display:flex;}
.note-modal-inner{background:var(--bg2);border:1px solid var(--border-red);border-radius:18px 18px 0 0;padding:18px 18px 36px;width:100%;max-width:560px;}
.nm-title{color:var(--text);font-size:15px;font-weight:700;margin-bottom:11px;text-transform:uppercase;}
.nm-ta{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:15px;padding:11px;outline:none;resize:none;height:100px;border-radius:var(--r);line-height:1.4;}
.nm-ta:focus{border-color:var(--cyan);}
.nm-btns{display:flex;gap:7px;margin-top:11px;}
.nm-save{flex:1;background:var(--red);border:none;color:#fff;font-family:var(--font);font-size:14px;font-weight:700;padding:13px;cursor:pointer;border-radius:var(--r);min-height:46px;text-transform:uppercase;}
.nm-save:active{background:var(--red-dark);}
.nm-cancel{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:14px;font-weight:700;padding:13px 18px;cursor:pointer;border-radius:var(--r);min-height:46px;text-transform:uppercase;}
.nm-cancel:active{background:var(--bg4);}

/* ── REGIONAL ── */
.regional-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.reg-card{border-color:rgba(187,136,255,0.2);}
.reg-card.caught{border-color:var(--purple);background:rgba(187,136,255,0.05);}
.reg-lbl{font-size:9px;color:var(--purple);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700;}

/* ── NOTES VIEW ── */
.notes-list{display:flex;flex-direction:column;gap:7px;}
.note-item{background:var(--bg2);border:1px solid var(--border);padding:11px 13px;display:flex;gap:11px;align-items:flex-start;cursor:pointer;border-radius:var(--r);transition:border-color 0.15s;}
.note-item:hover{border-color:rgba(0,229,255,0.3);}
.ni-img{width:44px;height:44px;image-rendering:pixelated;flex-shrink:0;}
.ni-info{flex:1;min-width:0;}
.ni-name{color:var(--text);font-size:13px;font-weight:700;margin-bottom:3px;text-transform:uppercase;}
.ni-text{color:var(--text2);font-size:13px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.4;}
.ni-del{color:var(--red);font-size:17px;cursor:pointer;padding:4px 6px;flex-shrink:0;opacity:0.6;transition:opacity 0.15s;}
.ni-del:hover{opacity:1;}
.empty-msg{color:var(--text3);font-size:14px;text-align:center;padding:36px 18px;line-height:3;}

/* ── EXPORT VIEW ── */
.sec-title{color:var(--text2);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:7px;margin-bottom:13px;}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:13px;}
.exp-card{background:var(--bg2);border:1px solid var(--border);padding:12px;border-radius:var(--r);text-align:center;}
.exp-num{font-size:30px;font-weight:700;color:var(--red);}
.exp-lbl{color:var(--text3);font-size:10px;font-weight:700;margin-top:3px;letter-spacing:1px;text-transform:uppercase;}
.exp-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:13px;}
.exp-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-family:var(--font);font-size:12px;font-weight:700;padding:13px 5px;cursor:pointer;border-radius:var(--r);text-align:center;min-height:46px;transition:all 0.15s;text-transform:uppercase;}
.exp-btn:active{background:var(--bg3);color:var(--text);}
.imp-area{background:var(--bg2);border:1px solid var(--border);padding:13px;border-radius:var(--r);}
.imp-lbl{color:var(--text3);font-size:11px;font-weight:700;margin-bottom:7px;letter-spacing:1px;text-transform:uppercase;}
.imp-ta{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:8px;outline:none;resize:none;height:65px;border-radius:var(--r);}
.imp-btn{width:100%;background:var(--bg2);border:1px solid var(--border-red);color:var(--red);font-family:var(--font);font-size:12px;font-weight:700;padding:13px;cursor:pointer;border-radius:var(--r);margin-top:7px;min-height:46px;text-transform:uppercase;transition:all 0.15s;}
.imp-btn:active{background:var(--red-dim);}
.exp-msg{color:var(--green);font-size:12px;text-align:center;margin-top:7px;min-height:16px;font-weight:600;}

/* ── LOADING ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:220px;gap:13px;}
.loading-text{color:var(--red);font-family:var(--pixel);font-size:8px;animation:blink 1s step-end infinite;}
.lb-wrap{width:200px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.lb{height:100%;background:var(--red);width:0%;transition:width 0.4s;box-shadow:0 0 8px var(--red);}
.loading-sub{color:var(--text3);font-size:11px;font-weight:600;}
@keyframes blink{50%{opacity:0;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}
.poke-card{animation:fadeIn 0.15s ease both;}

/* ── DESKTOP ── */
@media(min-width:900px){
  .app-body{flex-direction:row;}
  .sidebar{display:flex;}
  .main{padding:18px 22px 24px;}
  .bottom-nav{display:none !important;}
  .pokemon-grid{grid-template-columns:repeat(5,1fr);gap:7px;}
  .regional-grid{grid-template-columns:repeat(5,1fr);}

  .drawer-overlay{display:none !important;}
  .detail-drawer{

  .detail-drawer.open{display:block !important;}
  .drawer-handle{display:none;}
  .drawer-inner{padding:18px 18px 18px !important;}
  .note-modal{align-items:center !important;}
  .note-modal-inner{border-radius:var(--r2) !important;max-width:520px;padding:26px !important;}
}
@media(min-width:1200px){
  .sidebar{width:240px;}
  .pokemon-grid{grid-template-columns:repeat(6,1fr) !important;}
  .regional-grid{grid-template-columns:repeat(6,1fr) !important;}
}
@media(min-width:1500px){
  .pokemon-grid{grid-template-columns:repeat(7,1fr) !important;}
}
/* Tablet: centered column */
@media(min-width:600px) and (max-width:899px){
  .app{max-width:600px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,0.8);}

  .detail-drawer.open{transform:translateX(-50%) translateY(0);}
  .bottom-nav{max-width:600px;left:50%;transform:translateX(-50%);}
}
</style>

  {key:'hisuian-zoroark',name:'Zoroark',region:'hisuian',sprite:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/10241.png',artwork:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10241.png',shiny:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/10241.png',url:'https://pokeapi.co/api/v2/pokemon/zoroark-hisui'},
  {key:'hisuian-decidueye',name:'Decidueye',region:'hisuian',sprite:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/10246.png',artwork:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10246.png',shiny:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/10246.png',url:'https://pokeapi.co/api/v2/pokemon/decidueye-hisui'},
  {key:'paldean-tauros-combat',name:'Tauros (C)',region:'paldean',sprite:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/10250.png',artwork:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10250.png',shiny:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/10250.png',url:'https://pokeapi.co/api/v2/pokemon/tauros-paldea-combat-breed'},
  {key:'paldean-wooper',name:'Wooper',region:'paldean',sprite:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/10253.png',artwork:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/10253.png',shiny:'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/10253.png',url:'https://pokeapi.co/api/v2/pokemon/wooper-paldea'},
];
const RL={alolan:'Alolan',galarian:'Galarian',hisuian:'Hisuian',paldean:'Paldean'};
const RC2={alolan:'#FF8800',galarian:'#8855FF',hisuian:'#CC2222',paldean:'#2255CC'};
const RNM={alola:'Alolan',galar:'Galarian',hisui:'Hisuian',paldea:'Paldean'};

function ld(k,d){try{return JSON.parse(localStorage.getItem(k)||'null')||d;}catch(e){return d;}}
function saveAll(){try{['caught','shiny','notes','regional','shinyReg'].forEach((k,i)=>localStorage.setItem('pdx_'+k,JSON.stringify([caught,shiny,notes,caughtReg,shinyReg][i])));}catch(e){}}

let all=[],filtered=[],filteredReg=RF;
let caught=ld('pdx_caught',{}),shiny=ld('pdx_shiny',{}),notes=ld('pdx_notes',{});
let caughtReg=ld('pdx_regional',{}),shinyReg=ld('pdx_shinyReg',{});
let page=0,PG=30,gen=0,filter='all',mode='normal',regFilter='all';
let selPoke=null,selReg=null,noteTarget=null,loaded=false;
let cache={},rcache={},abCache={},spCache={},evoCache={};

async function loadPokedex(){
  try{
    const r=await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
    const d=await r.json();
    document.getElementById('lb').style.width='80%';
    all=d.results.map((p,i)=>{
      const id=i+1;let g=1;
      for(let x=1;x<=9;x++){if(id>=GEN[x].s&&id<=GEN[x].e){g=x;break;}}
      return{id,name:p.name,url:p.url,types:[],gen:g};
    });
    document.getElementById('lb').style.width='100%';
    setTimeout(()=>{
      document.getElementById('loader').style.display='none';
      document.getElementById('pgn').style.display='flex';
      loaded=true;applyF();renderGrid();updateStats();
    },300);
  }catch(e){document.getElementById('loader').innerHTML='<div class="loading-text">ERROR</div><div class="loading-sub">Verificá tu conexión</div>';}
}

async function getPD(id,url){if(cache[id])return cache[id];const r=await fetch(url);const d=await r.json();cache[id]=d;if(all[id-1])all[id-1].types=d.types.map(t=>t.type.name);return d;}
async function getAb(url){if(abCache[url])return abCache[url];try{const r=await fetch(url);const d=await r.json();const e=d.flavor_text_entries.find(x=>x.language.name==='es')||d.flavor_text_entries.find(x=>x.language.name==='en')||{flavor_text:'Sin descripción.'};const t=e.flavor_text.replace(/[\n\f]/g,' ');abCache[url]=t;return t;}catch(e){return 'Sin descripción.';}}
async function getSp(id){if(spCache[id])return spCache[id];try{const r=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}/`);const d=await r.json();spCache[id]=d;return d;}catch(e){return null;}}
async function getEvo(url){if(evoCache[url])return evoCache[url];try{const r=await fetch(url);const d=await r.json();evoCache[url]=d;return d;}catch(e){return null;}}
function flatChain(chain){const a=[];function w(n){const id=n.species.url.split('/').filter(Boolean).pop();a.push({name:n.species.name,id:parseInt(id)});n.evolves_to.forEach(w);}w(chain);return a;}
function typeBadge(t){const c=TC[t]||{bg:'#555',t:'#fff'};return `<span class="type-badge" style="background:${c.bg};color:${c.t}">${t}</span>`;}

function isDesktop(){return window.innerWidth>=900;}

function setMode(m){
  mode=m;
  // Mobile nav
  const mn=['normal','shiny','regional','notes','export'];
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',mn[i]===m));
  // Sidebar
  document.querySelectorAll('.sidebar-tab').forEach((b,i)=>b.classList.toggle('active',mn[i]===m));
  // Views
  document.getElementById('view-main').style.display=(m==='normal'||m==='shiny')?'block':'none';
  document.getElementById('view-reg').style.display=m==='regional'?'block':'none';
  document.getElementById('view-notes').style.display=m==='notes'?'block':'none';
  document.getElementById('view-export').style.display=m==='export'?'block':'none';
  if(!isDesktop())closeDrawer();
  if(m==='regional'){applyRegF();renderRegGrid();updateRegStats();}
  else if(m==='notes'){renderNotes();}
  else if(m==='export'){updateExportStats();}
  else{applyF();renderGrid();updateStats();}
}

function setGen(g){gen=g;document.querySelectorAll('.gen-btn').forEach((b,i)=>b.classList.toggle('active',i===g));page=0;applyF();renderGrid();updateStats();}
function setFilter(f){filter=f;document.querySelectorAll('.filter-pills .pill').forEach((b,i)=>b.classList.toggle('active',['all','caught','missing','noted'][i]===f));page=0;applyF();renderGrid();}
function applyF(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const tp=document.getElementById('type-filter').value;
  filtered=all.filter(p=>{
    if(gen>0&&p.gen!==gen)return false;
    if(q&&!p.name.includes(q)&&!String(p.id).includes(q))return false;
    if(tp&&p.types.length>0&&!p.types.includes(tp))return false;
    if(filter==='caught'&&!caught[p.id])return false;
    if(filter==='missing'&&caught[p.id])return false;
    if(filter==='noted'&&!notes[p.id])return false;
    return true;
  });
}

function renderGrid(){
  if(!loaded)return;
  const g=document.getElementById('grid');
  const pg=filtered.slice(page*PG,(page+1)*PG);
  if(!pg.length){g.innerHTML='<div style="grid-column:1/-1;color:var(--text3);font-size:14px;text-align:center;padding:40px">No se encontraron Pokémon</div>';document.getElementById('pg-info').textContent='';return;}
  g.innerHTML=pg.map(p=>{
    const s=shiny[p.id],n=caught[p.id],hn=!!notes[p.id],sel=selPoke&&selPoke.id===p.id;
    const img=s?`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${p.id}.png`:`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`;
    return `<div class="poke-card${s?' shiny-caught':''}${n&&!s?' caught':''}${sel?' selected':''}${hn?' has-note':''}" onclick="openPoke(${p.id},'${p.name}','${p.url}')">
      <div class="caught-mark"></div><div class="shiny-badge">★</div>
      <div class="poke-num">#${String(p.id).padStart(4,'0')}</div>
      <img class="poke-img" src="${img}" loading="lazy" onerror="this.style.visibility='hidden'"/>
      <div class="poke-name">${p.name.replace(/-/g,' ')}</div>
    </div>`;
  }).join('');
  const total=filtered.length,pages=Math.ceil(total/PG);
  document.getElementById('pg-info').textContent=`${page+1} / ${pages}`;
}

async function openPoke(id,name,url){
  selPoke={id,name,url};renderGrid();openDrawer();
  const nArt=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
  const sArt=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${id}.png`;
  const sSpr=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${id}.png`;
  const gname=all[id-1]?GEN[all[id-1].gen].n:'';
  document.getElementById('di').innerHTML=`
    <div class="drawer-name">${name.replace(/-/g,' ')}</div>
    <div class="drawer-num">#${String(id).padStart(4,'0')} · ${gname}</div>
    <div class="drawer-imgs">
      <div class="dib"><div class="dib-lbl">Normal</div><img class="dart" src="${nArt}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png'"/></div>
      <div class="dib"><div class="dib-lbl sl">★ Shiny</div><img class="dart" src="${sArt}" onerror="this.src='${sSpr}'"/></div>
    </div>
    <div class="catch-row" id="cr">${buildCR(id)}</div>
    <div class="type-badges" id="dt"><span style="color:var(--text3)">Cargando...</span></div>
    <div class="poke-desc" id="dp"><div style="color:var(--text3);font-size:12px">Cargando descripción...</div></div>
    <div class="dtabs">
      <button class="dtab active" id="tab-stats" onclick="swTab('stats')">Stats</button>
      <button class="dtab" id="tab-abilities" onclick="swTab('abilities')">Habilidades</button>
      <button class="dtab" id="tab-info" onclick="swTab('info')">Info</button>
      <button class="dtab" id="tab-forms" onclick="swTab('forms')">Formas</button>
    </div>
    <div class="dsec vis" id="sec-stats"><div id="dstats"><div class="ab-loading">Cargando...</div></div></div>
    <div class="dsec" id="sec-abilities"><div class="ab-list" id="dab"><div class="ab-loading">Cargando habilidades...</div></div></div>
    <div class="dsec" id="sec-info"><div id="dinfo"><div class="ab-loading">Cargando info...</div></div></div>
    <div class="dsec" id="sec-forms"><div id="dforms"><div class="ab-loading">Cargando formas...</div></div></div>
    ${notes[id]?`<div class="note-preview" id="dnp">✎ ${notes[id]}</div>`:'<div id="dnp"></div>'}`;
  try{
    const data=await getPD(id,url);
    const tn=data.types.map(t=>t.type.name);
    document.getElementById('dt').innerHTML=tn.map(typeBadge).join('');
    const tot=data.stats.slice(0,6).reduce((s,x)=>s+x.base_stat,0);
    document.getElementById('dstats').innerHTML=data.stats.slice(0,6).map(s=>{
      const l=SN[s.stat.name]||s.stat.name.substring(0,3).toUpperCase();
      const p=Math.min(100,Math.round(s.base_stat/255*100));
      const col=s.base_stat>=100?'#FFD700':s.base_stat>=70?'#00ff88':'#E8192C';
      return `<div class="stat-row"><div class="stat-lbl">${l}</div><div class="stat-bg"><div class="stat-fill" style="width:${p}%;background:${col}"></div></div><div class="stat-val">${s.base_stat}</div></div>`;
    }).join('')+`<div class="stat-total">TOTAL: ${tot}</div>`;
    document.getElementById('dab').innerHTML=data.abilities.map(a=>`
      <div class="ab-card${a.is_hidden?' hidden':''}">
        <div class="ab-header"><div class="ab-name">${a.ability.name.replace(/-/g,' ')}</div>${a.is_hidden?'<span class="ab-tag">Oculta</span>':''}</div>
        <div class="ab-desc" id="ab_${a.ability.name.replace(/-/g,'_')}">Cargando...</div>
      </div>`).join('');
    data.abilities.forEach(async a=>{const k='ab_'+a.ability.name.replace(/-/g,'_');const t=await getAb(a.ability.url);const el=document.getElementById(k);if(el)el.textContent=t;});
    document.getElementById('dinfo').innerHTML=`
      <div class="info-grid">
        <div class="info-card"><div class="info-lbl">Peso</div><div class="info-val">${data.weight/10} kg</div></div>
        <div class="info-card"><div class="info-lbl">Altura</div><div class="info-val">${data.height/10} m</div></div>
        <div class="info-card"><div class="info-lbl">Exp Base</div><div class="info-val">${data.base_experience||'?'}</div></div>
        <div class="info-card"><div class="info-lbl">Amistad</div><div class="info-val" id="dbf">...</div></div>
      </div>
      <div class="evo-wrap" id="devo"><div class="evo-lbl">Evoluciones</div><div class="ab-loading">Cargando...</div></div>`;
    const sp=await getSp(id);
    if(sp){
      const de=sp.flavor_text_entries.find(x=>x.language.name==='es')||sp.flavor_text_entries.find(x=>x.language.name==='en');
      const genus=sp.genera?.find(g=>g.language.name==='es')?.genus||sp.genera?.find(g=>g.language.name==='en')?.genus||'';
      const dpEl=document.getElementById('dp');
      if(dpEl)dpEl.innerHTML=(genus?`<div class="poke-genus">${genus}</div>`:'')+
        (de?`<div class="poke-desc-text">${de.flavor_text.replace(/[\n\f]/g,' ')}</div>`:'');
      const bfEl=document.getElementById('dbf');if(bfEl)bfEl.textContent=sp.base_happiness??'?';
      if(sp.evolution_chain){const ed=await getEvo(sp.evolution_chain.url);if(ed){const ch=flatChain(ed.chain),devo=document.getElementById('devo');
        if(devo)devo.innerHTML='<div class="evo-lbl">Evoluciones</div><div class="evo-chain">'+
          ch.map((e,i)=>`${i>0?'<div class="evo-arrow">→</div>':''}<div class="evo-item" onclick="openById(${e.id})"><img class="evo-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${e.id}.png" onerror="this.style.display='none'"/><div class="evo-name">${e.name.replace(/-/g,' ')}</div></div>`).join('')+'</div>';}}
      // Forms
      await loadForms(id,sp);
    }
    applyF();renderGrid();
  }catch(err){console.error(err);}
}

async function loadForms(baseId,sp){
  const el=document.getElementById('dforms');if(!el)return;
  const varieties=(sp.varieties||[]).filter(v=>!v.is_default);
  if(!varieties.length){el.innerHTML='<div class="no-forms">Sin formas alternativas.</div>';return;}
  el.innerHTML='<div class="forms-title">FORMAS ALTERNATIVAS</div><div class="forms-grid" id="fg"></div>';
  const fg=document.getElementById('fg');if(!fg)return;
  for(const v of varieties){
    const vn=v.pokemon.name;
    let region=null,rlabel=null,rcolor='#888';
    for(const [k,lb] of Object.entries(RNM)){if(vn.includes(k)){region=k;rlabel=lb;rcolor=Object.values(RC2)[Object.keys(RNM).indexOf(k)];break;}}
    const cid='fc_'+vn.replace(/-/g,'_');
    const card=document.createElement('div');
    card.className='form-card'+(region?' reg':'');card.id=cid;
    card.innerHTML=`<div class="form-card-lbl${region?' rl':''}">${vn.replace(/-/g,' ')}</div>
      <div class="form-imgs-row">
        <div class="form-img-box"><div class="form-sublbl">Normal</div><div style="width:66px;height:66px;background:var(--bg4);border-radius:6px;display:flex;align-items:center;justify-content:center"><span style="color:var(--text3);font-size:10px">...</span></div></div>
        <div class="form-img-box"><div class="form-sublbl sl">★ Shiny</div><div style="width:66px;height:66px;background:var(--bg4);border-radius:6px;display:flex;align-items:center;justify-content:center"><span style="color:var(--text3);font-size:10px">...</span></div></div>
      </div>`;
    fg.appendChild(card);
    fetch(v.pokemon.url).then(r=>r.json()).then(vd=>{
      const vid=vd.id;
      const na=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${vid}.png`;
      const sa=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/shiny/${vid}.png`;
      const ns=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${vid}.png`;
      const ss=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${vid}.png`;
      const types=vd.types.map(t=>t.type.name);
      const c=document.getElementById(cid);if(!c)return;
      c.innerHTML=`<div class="form-card-lbl${region?' rl':''}">${vn.replace(/-/g,' ')}</div>
        <div class="form-imgs-row">
          <div class="form-img-box"><div class="form-sublbl">Normal</div><img class="form-art" src="${na}" onerror="this.src='${ns}'" loading="lazy"/></div>
          <div class="form-img-box"><div class="form-sublbl sl">★ Shiny</div><img class="form-art" src="${sa}" onerror="this.src='${ss}'" loading="lazy"/></div>
        </div>
        <div class="form-types">${types.map(t=>{const c=TC[t]||{bg:'#555',t:'#fff'};return `<span class="form-tbadge" style="background:${c.bg};color:${c.t}">${t}</span>`;}).join('')}</div>
        ${region?`<div><span class="form-rtag" style="background:${rcolor}22;color:${rcolor};border:1px solid ${rcolor}44">${rlabel}</span></div>`:''}`;
    }).catch(()=>{});
  }
}

function swTab(t){['stats','abilities','info','forms'].forEach(x=>{document.getElementById('tab-'+x).classList.toggle('active',x===t);document.getElementById('sec-'+x).classList.toggle('vis',x===t);});}
function openById(id){const p=all[id-1];if(p)openPoke(id,p.name,p.url);}

function buildCR(id){return `<button class="catch-btn${caught[id]?' caught-btn':''}" onclick="tC('n')">${caught[id]?'✓ Capturado':'◉ Capturar'}</button><button class="catch-btn shiny-cb${shiny[id]?' caught-btn':''}" onclick="tC('s')">${shiny[id]?'★ Shiny':'☆ Shiny'}</button><button class="catch-btn note-cb" onclick="openNM(${id},'${all[id-1]?.name||''}')">✎</button>`;}
function tC(t){if(!selPoke)return;const id=selPoke.id;if(t==='n'){caught[id]?delete caught[id]:caught[id]=true;}else{shiny[id]?delete shiny[id]:shiny[id]=true;}saveAll();updateStats();applyF();renderGrid();const r=document.getElementById('cr');if(r)r.innerHTML=buildCR(id);}

function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  if(!isDesktop())document.getElementById('dov').classList.add('open');
  else{setTimeout(()=>document.getElementById('drawer').scrollIntoView({behavior:'smooth',block:'nearest'}),50);}
}
function closeDrawer(){
  if(isDesktop())return;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('dov').classList.remove('open');
  selPoke=null;selReg=null;renderGrid();
}

function updateStats(){
  const pool=gen>0?all.filter(p=>p.gen===gen):all;
  const c=pool.filter(p=>caught[p.id]).length,s=pool.filter(p=>shiny[p.id]).length,tot=pool.length;
  document.getElementById('cnt-cap').textContent=`Cap: ${c}`;
  document.getElementById('cnt-tot').textContent=`Tot: ${tot}`;
  document.getElementById('cnt-pct').textContent=tot?`${Math.round(c/tot*100)}%`:'0%';
  document.getElementById('cnt-shiny').textContent=`★ ${s}`;
}

function openNM(id,name){noteTarget={id,name};document.getElementById('nm-title').textContent=`Nota — ${name.replace(/-/g,' ')}`;document.getElementById('nm-ta').value=notes[id]||'';document.getElementById('note-modal').classList.add('open');}
function closeNM(){document.getElementById('note-modal').classList.remove('open');noteTarget=null;}
function saveNote(){if(!noteTarget)return;const v=document.getElementById('nm-ta').value.trim();if(v)notes[noteTarget.id]=v;else delete notes[noteTarget.id];saveAll();closeNM();const np=document.getElementById('dnp');if(np)np.textContent=notes[noteTarget.id]?'✎ '+notes[noteTarget.id]:'';applyF();renderGrid();if(mode==='notes')renderNotes();if(mode==='export')updateExportStats();}
function renderNotes(){const q=document.getElementById('notes-search').value.toLowerCase();const list=document.getElementById('notes-list');const ids=Object.keys(notes).filter(id=>{const p=all[id-1];return p&&(!q||p.name.includes(q)||notes[id].toLowerCase().includes(q));});if(!ids.length){list.innerHTML='<div class="empty-msg">Sin notas aún.\n\nSeleccioná un Pokémon\ny presioná ✎</div>';return;}list.innerHTML=ids.map(id=>{const p=all[id-1];if(!p)return '';return `<div class="note-item" onclick="goNote(${id})"><img class="ni-img" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png" onerror="this.style.display='none'"/><div class="ni-info"><div class="ni-name">#${String(id).padStart(4,'0')} ${p.name.replace(/-/g,' ')}</div><div class="ni-text">${notes[id]}</div></div><div class="ni-del" onclick="event.stopPropagation();delNote(${id})">✕</div></div>`;}).join('');}
function delNote(id){delete notes[id];saveAll();renderNotes();if(mode==='export')updateExportStats();}
function goNote(id){const p=all[id-1];if(!p)return;setMode('normal');setTimeout(()=>openPoke(id,p.name,p.url),200);}

function setRegF(f){regFilter=f;document.querySelectorAll('#reg-pills .pill').forEach((b,i)=>b.classList.toggle('active',['all','alolan','galarian','hisuian','paldean','caught','missing'][i]===f));applyRegF();renderRegGrid();updateRegStats();}
function applyRegF(){filteredReg=RF.filter(p=>{if(['alolan','galarian','hisuian','paldean'].includes(regFilter)&&p.region!==regFilter)return false;if(regFilter==='caught'&&!caughtReg[p.key])return false;if(regFilter==='missing'&&caughtReg[p.key])return false;return true;});}
function renderRegGrid(){
  const g=document.getElementById('reg-grid');if(!loaded){g.innerHTML='<div style="grid-column:1/-1;color:var(--text3);text-align:center;padding:24px">Cargando...</div>';return;}
  if(!filteredReg.length){g.innerHTML='<div style="grid-column:1/-1;color:var(--text3);text-align:center;padding:24px">Sin Pokémon</div>';return;}
  g.innerHTML=filteredReg.map(p=>{
    const cap=caughtReg[p.key],shin=shinyReg[p.key],sel=selReg&&selReg.key===p.key;
    return `<div class="poke-card reg-card${cap?' caught':''}${shin?' shiny-caught':''}${sel?' selected':''}" onclick="openReg('${p.key}')">
      <div class="caught-mark" style="${cap?`background:${RC2[p.region]}`:''}"></div>
      ${shin?'<div class="shiny-badge">★</div>':''}
      <div class="poke-num" style="color:${RC2[p.region]}">${RL[p.region].substring(0,3).toUpperCase()}</div>
      <img class="poke-img" src="${cap&&shin?p.shiny:p.sprite}" style="${cap?'filter:none':''}" loading="lazy"/>
      <div class="poke-name reg-lbl">${p.name.replace(/-/g,' ')}</div>
    </div>`;
  }).join('');}
async function openReg(key){
  const p=RF.find(x=>x.key===key);if(!p)return;
  selReg=p;renderRegGrid();openDrawer();
  document.getElementById('di').innerHTML=`
    <div class="drawer-name" style="color:var(--purple)">${RL[p.region]} ${p.name}</div>
    <div class="drawer-num" style="color:${RC2[p.region]}">Forma Regional · ${RL[p.region]}</div>
    <div class="drawer-imgs">
      <div class="dib"><div class="dib-lbl">Normal</div><img class="dart" src="${p.artwork}" onerror="this.src='${p.sprite}'"/></div>
      <div class="dib"><div class="dib-lbl sl">★ Shiny</div><img class="dart" src="${p.shiny}"/></div>
    </div>
    <div class="catch-row" id="cr">${buildRCR(key)}</div>
    <div class="type-badges" id="dt"><span style="color:var(--text3)">Cargando...</span></div>
    <div class="dtabs">
      <button class="dtab active" id="tab-stats" onclick="swTab('stats')">Stats</button>
      <button class="dtab" id="tab-abilities" onclick="swTab('abilities')">Habilidades</button>
      <button class="dtab" id="tab-info" onclick="swTab('info')">Info</button>
    </div>
    <div class="dsec vis" id="sec-stats"><div id="dstats"><div class="ab-loading">Cargando...</div></div></div>
    <div class="dsec" id="sec-abilities"><div class="ab-list" id="dab"><div class="ab-loading">Cargando...</div></div></div>
    <div class="dsec" id="sec-info"><div id="dinfo"><div class="ab-loading">Cargando...</div></div></div>`;
  try{
    if(!rcache[key]){const r=await fetch(p.url);rcache[key]=await r.json();}
    const d=rcache[key];
    const tn=d.types.map(t=>t.type.name);
    document.getElementById('dt').innerHTML=tn.map(typeBadge).join('');
    const tot=d.stats.slice(0,6).reduce((s,x)=>s+x.base_stat,0);
    document.getElementById('dstats').innerHTML=d.stats.slice(0,6).map(s=>{const l=SN[s.stat.name]||s.stat.name.substring(0,3).toUpperCase(),pct=Math.min(100,Math.round(s.base_stat/255*100)),col=s.base_stat>=100?'#FFD700':s.base_stat>=70?'#00ff88':'#bb88ff';return `<div class="stat-row"><div class="stat-lbl">${l}</div><div class="stat-bg"><div class="stat-fill" style="width:${pct}%;background:${col}"></div></div><div class="stat-val">${s.base_stat}</div></div>`;}).join('')+`<div class="stat-total">TOTAL: ${tot}</div>`;
    document.getElementById('dab').innerHTML=d.abilities.map(a=>`<div class="ab-card${a.is_hidden?' hidden':''}"><div class="ab-header"><div class="ab-name" style="color:var(--purple)">${a.ability.name.replace(/-/g,' ')}</div>${a.is_hidden?'<span class="ab-tag">Oculta</span>':''}</div><div class="ab-desc" id="ab_${a.ability.name.replace(/-/g,'_')}">Cargando...</div></div>`).join('');
    d.abilities.forEach(async a=>{const k='ab_'+a.ability.name.replace(/-/g,'_');const t=await getAb(a.ability.url);const el=document.getElementById(k);if(el)el.textContent=t;});
    document.getElementById('dinfo').innerHTML=`<div class="info-grid"><div class="info-card"><div class="info-lbl">Peso</div><div class="info-val">${d.weight/10} kg</div></div><div class="info-card"><div class="info-lbl">Altura</div><div class="info-val">${d.height/10} m</div></div><div class="info-card"><div class="info-lbl">Región</div><div class="info-val" style="color:${RC2[p.region]}">${RL[p.region]}</div></div><div class="info-card"><div class="info-lbl">Exp Base</div><div class="info-val">${d.base_experience||'?'}</div></div></div>`;
  }catch(e){}
}
function buildRCR(key){return `<button class="catch-btn${caughtReg[key]?' caught-btn':''}" style="border-color:rgba(187,136,255,0.4);color:var(--purple)" onclick="tRC('${key}','n')">${caughtReg[key]?'✓ Capturado':'◉ Capturar'}</button><button class="catch-btn shiny-cb${shinyReg[key]?' caught-btn':''}" onclick="tRC('${key}','s')">${shinyReg[key]?'★ Shiny':'☆ Shiny'}</button>`;}
function tRC(key,t){if(t==='n'){caughtReg[key]?delete caughtReg[key]:caughtReg[key]=true;}else{shinyReg[key]?delete shinyReg[key]:shinyReg[key]=true;}saveAll();updateRegStats();renderRegGrid();const r=document.getElementById('cr');if(r)r.innerHTML=buildRCR(key);}
function updateRegStats(){const c=RF.filter(p=>caughtReg[p.key]).length,s=RF.filter(p=>shinyReg[p.key]).length,tot=RF.length;document.getElementById('rc-cap').textContent=`Cap: ${c}`;document.getElementById('rc-tot').textContent=`Tot: ${tot}`;document.getElementById('rc-pct').textContent=tot?`${Math.round(c/tot*100)}%`:'0%';document.getElementById('rc-shiny').textContent=`★ ${s}`;}
function catchAllReg(){filteredReg.forEach(p=>caughtReg[p.key]=true);saveAll();renderRegGrid();updateRegStats();}
function resetReg(){if(!confirm('¿Resetear regionales?'))return;filteredReg.forEach(p=>{delete caughtReg[p.key];delete shinyReg[p.key];});saveAll();renderRegGrid();updateRegStats();}

function updateExportStats(){document.getElementById('ex-cap').textContent=Object.keys(caught).length;document.getElementById('ex-shiny').textContent=Object.keys(shiny).length;document.getElementById('ex-reg').textContent=Object.keys(caughtReg).length;document.getElementById('ex-notes').textContent=Object.keys(notes).length;}
function bExp(){return{v:'2.0',date:new Date().toISOString().split('T')[0],caught,shiny,notes,caughtReg,shinyReg};}
function showMsg(m){const el=document.getElementById('exp-msg');el.textContent=m;setTimeout(()=>el.textContent='',3000);}
function exportJSON(){const b=new Blob([JSON.stringify(bExp(),null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`pokedex_${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(u);showMsg('✓ JSON exportado!');}
function exportCSV(){const rows=[['ID','Nombre','Gen','Capturado','Shiny','Nota']];all.forEach(p=>{if(caught[p.id]||shiny[p.id]||notes[p.id])rows.push([p.id,p.name,GEN[p.gen].n,caught[p.id]?'SI':'NO',shiny[p.id]?'SI':'NO',notes[p.id]||'']);});const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`pokedex_${new Date().toISOString().split('T')[0]}.csv`;a.click();URL.revokeObjectURL(u);showMsg('✓ CSV exportado!');}
function exportTXT(){let t=`POKÉDEX — ${new Date().toLocaleDateString('es-AR')}\nCap: ${Object.keys(caught).length} | Shiny: ${Object.keys(shiny).length}\n\n`;all.filter(p=>caught[p.id]).forEach(p=>{t+=`#${String(p.id).padStart(4,'0')} ${p.name.toUpperCase()}${shiny[p.id]?' ★':''}${notes[p.id]?'\n  → '+notes[p.id]:''}\n`;});const b=new Blob([t],{type:'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`pokedex_${new Date().toISOString().split('T')[0]}.txt`;a.click();URL.revokeObjectURL(u);showMsg('✓ TXT exportado!');}
function copyCB(){navigator.clipboard.writeText(JSON.stringify(bExp())).then(()=>showMsg('✓ Copiado!')).catch(()=>showMsg('✗ Error'));}
function importData(){try{const d=JSON.parse(document.getElementById('imp-ta').value.trim());if(d.caught)caught=d.caught;if(d.shiny)shiny=d.shiny;if(d.notes)notes=d.notes;if(d.caughtReg)caughtReg=d.caughtReg;if(d.shinyReg)shinyReg=d.shinyReg;saveAll();updateStats();applyF();renderGrid();updateExportStats();document.getElementById('imp-ta').value='';showMsg('✓ Importado!');}catch(e){showMsg('✗ JSON inválido');}}

function prevPage(){if(page>0){page--;renderGrid();document.getElementById('main').scrollTo(0,0);}}
function nextPage(){const mx=Math.ceil(filtered.length/PG)-1;if(page<mx){page++;renderGrid();document.getElementById('main').scrollTo(0,0);}}
function catchAll(){const pool=gen>0?all.filter(p=>p.gen===gen):all;if(mode==='shiny')pool.forEach(p=>shiny[p.id]=true);else pool.forEach(p=>caught[p.id]=true);saveAll();updateStats();applyF();renderGrid();}
function resetAll(){if(!confirm('¿Resetear?'))return;const pool=gen>0?all.filter(p=>p.gen===gen):all;if(mode==='shiny')pool.forEach(p=>delete shiny[p.id]);else pool.forEach(p=>delete caught[p.id]);saveAll();updateStats();applyF();renderGrid();}

document.getElementById('search').addEventListener('input',()=>{page=0;applyF();renderGrid();});
document.getElementById('type-filter').addEventListener('change',()=>{page=0;applyF();renderGrid();});

loadPokedex();
</script>

<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(r => console.log("SW registrado:", r.scope))
      .catch(e => console.log("SW error:", e));
  });
}
</script>
</body>
